<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esquemas UM Lite — Pro Drawing</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: rgba(15, 23, 42, 0.8);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(30, 41, 59, 0.7);
            --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .topbar {
            background: var(--glass);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }

        .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.025em; display: flex; align-items: center; gap: 8px; }
        .topbar h1 span { color: var(--accent); font-style: italic; font-weight: 900; }
        
        .badge {
            font-size: 10px;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 2px 8px;
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            font-weight: 600;
        }

        .spacer { flex: 1; }

        .btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--text-dim); transform: translateY(-1px); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }

        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }

        .sidebar h3 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 24px 0 12px;
            letter-spacing: 0.1em;
        }

        .element-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .element-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: grab;
            transition: all 0.2s;
        }

        .element-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .element-item .preview {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .element-item .preview svg { max-width: 100%; max-height: 100%; stroke: #f8fafc; fill: none; }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #020617;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .canvas-toolbar {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--glass);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .canvas-toolbar button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .canvas-toolbar button.active { background: var(--accent); color: white; }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .element-node { cursor: move; }
        .element-node .bbox { fill: transparent; stroke: transparent; transition: stroke 0.2s; }
        .element-node:hover .bbox { stroke: rgba(59, 130, 246, 0.3); stroke-dasharray: 4 2; }
        .element-node.selected .bbox { stroke: var(--accent); stroke-width: 2; }
        .element-label { fill: var(--text-dim); font-size: 12px; font-weight: 500; pointer-events: none; }
        
        .connection { fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke-width 0.2s; }
        .connection:hover { stroke-width: 6 !important; opacity: 0.5; }
        
        .right-panel {
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 50;
        }

        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .field input, .field select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .status-bar {
            background: var(--bg-main);
            border-top: 1px solid var(--border);
            padding: 8px 24px;
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        @media (max-width: 768px) {
            .sidebar, .right-panel { display: none; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>UM<span>LITE</span></h1>
    <div class="badge">V2.1 Offline PRO</div>
    <div class="spacer"></div>
    <button class="btn" onclick="exportSVG()">Exportar SVG</button>
    <button class="btn primary" onclick="window.print()">Imprimir PDF</button>
</div>

<div class="workspace">
    <div class="sidebar">
        <h3>Elementos</h3>
        <div id="element-list" class="element-grid"></div>
        
        <h3>Plantillas</h3>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn" onclick="loadTemplate('liga')">LaLiga Standard</button>
            <button class="btn" onclick="loadTemplate('champions')">Champions Dual</button>
            <button class="btn" onclick="resetCanvas()">Lienzo Vacío</button>
        </div>
    </div>

    <div class="canvas-container" id="canvas-container">
        <div class="canvas-toolbar">
            <button id="tool-select" class="active" onclick="setTool('select')">Seleccionar</button>
            <button id="tool-connect" onclick="setTool('connect')">Conectar</button>
            <button onclick="addTextNoteCenter()">Texto</button>
      <button onclick="addBoxCenter()">Recuadro</button>
            <div style="width: 1px; background: var(--border); margin: 0 4px;"></div>
            <button onclick="deleteSelected()" title="Borrar">🗑</button>
            <button onclick="undo()" id="btn-undo" disabled>↶</button>
            <button onclick="redo()" id="btn-redo" disabled>↷</button>
        </div>

        <svg id="canvas" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
            <g id="grid-layer"></g>
            <g id="connections-layer"></g>
            <g id="elements-layer"></g>
            <g id="notes-layer"></g>
            <g id="overlay-layer"></g>
        </svg>
    </div>

    <div class="right-panel">
        <div id="inspector-default">
            <h3>Diagrama</h3>
            <div class="field">
                <label>Título</label>
                <input type="text" id="diagram-title" value="Nuevo Proyecto" oninput="saveAuto()">
            </div>
        </div>

        <div id="inspector-element" style="display: none;">
            <h3>Propiedades</h3>
            <div class="field">
                <label>Etiqueta</label>
                <input type="text" id="el-label" oninput="updateSelectedElement()">
            </div>
            <div class="field">
                <label>Orientación</label>
                <button class="btn primary" style="width:100%; justify-content: center;" onclick="toggleMirror()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8M10 17l5-5-5-5M15 12H9"/></svg>
                    Girar / Espejo
                </button>
            </div>
            
            <div class="suggestion-box" id="fast-mode-box">
                <h4>Conexión Inteligente</h4>
                <div id="suggestions-list"></div>
            </div>
        </div>

        <div id="inspector-connection" style="display: none;">
            <h3>Conexión</h3>
            <div class="field">
                <label>Tipo de Cable</label>
                <select id="conn-type" onchange="updateSelectedConnection()">
                    <option value="cable_audio">XLR Audio (Negro)</option>
                    <option value="cable_fibra">Fibra Digital (Naranja)</option>
                    <option value="cable_triax">Triax Cámara (Gris)</option>
                    <option value="manguera_8">Manguera 8ch (Naranja)</option>
                    <option value="manguera_16">Manguera 16ch (Azul)</option>
                </select>
            </div>
            <div class="field">
                <label>Etiqueta de Cable</label>
                <input type="text" id="conn-label" oninput="updateSelectedConnection()">
            </div>
        </div>
    </div>
</div>

<div class="status-bar">
    <div class="status-dot"></div>
    <span id="stats">Elementos: 0 | Conexiones: 0</span>
    <div class="spacer"></div>
    <span>Auto-guardado OK</span>
</div>

    const CABLE_TYPES = {
        cable_triax: { color: "#94a3b8", width: 4, label: "Triax" },
        cable_fibra: { color: "#f97316", width: 2.5, label: "Fibra Digital" },
        cable_audio: { color: "#000000", width: 1.5, label: "XLR Audio" },
        manguera_8:  { color: "#fb923c", width: 3.5, label: "Manguera 8" },
        manguera_16: { color: "#3b82f6", width: 4.5, label: "Manguera 16" }
    };

    let state = {
        elements: [],
        connections: [],
        selectedId: null,
        selectedType: null,
        tool: 'select',
        nextId: 1,
        history: [],
        historyIndex: -1,
        pendingSource: null
    };

    window.onload = () => {
        initLibrary();
        initCanvas();
        loadAuto();
    };

    function initLibrary() {
        const list = document.getElementById('element-list');
  list.innerHTML = '';
        ELEMENTS_LIBRARY.forEach(item => {
            const div = document.createElement('div');
            div.className = 'element-item';
            div.draggable = true;
            div.innerHTML = `<div class="preview">${item.svg}</div><div class="name">${item.nombre}</div>`;
            div.addEventListener('dragstart', (e) => e.dataTransfer.setData('type', item.tipo));
            list.appendChild(div);
        });
    }

    function initCanvas() {
        const svg = document.getElementById('canvas');
        svg.addEventListener('dragover', (e) => e.preventDefault());
        svg.addEventListener('drop', handleDrop);
        svg.addEventListener('click', handleCanvasClick);
        svg.addEventListener('mousemove', handleCanvasMouseMove);
        renderGrid();
    }

    function handleDrop(e) {
        e.preventDefault();
        const type = e.dataTransfer.getData('type');
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (1600 / rect.width);
        const y = (e.clientY - rect.top) * (900 / rect.height);
        addElement(type, x - 50, y - 50);
    }

    function addElement(type, x, y, label) {
        pushHistory();
        const meta = ELEMENTS_LIBRARY.find(m => m.tipo === type);
        const el = {
            id: state.nextId++,
            type, x: Math.round(x), y: Math.round(y),
            w: meta.w, h: meta.h,
            label: label || meta.nombre,
            mirror: false
        };
        state.elements.push(el);
        render();
        selectElement(el.id);
    }

    function selectElement(id) {
        state.selectedId = id;
        state.selectedType = 'element';
        const el = state.elements.find(e => String(e.id) === String(id));
        document.getElementById('inspector-default').style.display = 'none';
        document.getElementById('inspector-connection').style.display = 'none';
        document.getElementById('inspector-element').style.display = 'block';
        document.getElementById('el-label').value = el.label;
        render();
    }

    function toggleMirror() {
        if (state.selectedId && state.selectedType === 'element') {
            const el = state.elements.find(e => e.id === state.selectedId);
            el.mirror = !el.mirror;
            render();
        }
    }

    function updateSelectedElement() {
        const el = state.elements.find(e => e.id === state.selectedId);
        if (el) { el.label = document.getElementById('el-label').value; render(); }
    }

    function handleCanvasMouseDown(e) {
  if (state.tool === 'box') {
    const rect = document.getElementById('canvas').getBoundingClientRect();
    boxStart.x = Math.round((e.clientX - rect.left) / state.zoom);
    boxStart.y = Math.round((e.clientY - rect.top) / state.zoom);
    isDrawingBox = true;
  }
}

function handleCanvasMouseUp(e) {
  if (state.tool === 'box' && isDrawingBox) {
    const rect = document.getElementById('canvas').getBoundingClientRect();
    const x = Math.round((e.clientX - rect.left) / state.zoom);
    const y = Math.round((e.clientY - rect.top) / state.zoom);
    isDrawingBox = false;
    clearOverlay();
    let bx = Math.min(boxStart.x, x);
    let by = Math.min(boxStart.y, y);
    let bw = Math.abs(x - boxStart.x);
    let bh = Math.abs(y - boxStart.y);
    if (bw <= 20 || bh <= 20) {
      bx = x - 200; by = y - 150;
      bw = 400; bh = 300;
    }
    if (bw > 0 && bh > 0) {
      pushHistory();
      state.boxes = state.boxes || [];
      state.boxes.push({ id: state.nextId++, x: bx, y: by, w: bw, h: bh });
      renderAll();
      setTool('select');
    }
  }
}

function handleCanvasClick(e) {
        if (e.target === canvas) {
            state.selectedId = null;
            state.selectedType = null;
            state.pendingSource = null;
            document.getElementById('inspector-element').style.display = 'none';
            document.getElementById('inspector-connection').style.display = 'none';
            document.getElementById('inspector-default').style.display = 'block';
            render();
        }
    }

    function setTool(t) {
        state.tool = t;
        state.pendingSource = null;
        document.querySelectorAll('.canvas-toolbar button').forEach(b => b.classList.remove('active'));
        document.getElementById('tool-' + t).classList.add('active');
        render();
    }

    function onNodeClick(id) {
        if (state.tool === 'connect') {
            if (!state.pendingSource) {
                state.pendingSource = id;
                render();
            } else if (state.pendingSource !== id) {
                autoConnect(state.pendingSource, id);
                state.pendingSource = null;
            }
        } else {
            selectElement(id);
        }
    }

    function autoConnect(id1, id2) {
        const e1 = state.elements.find(e => e.id === id1);
        const e2 = state.elements.find(e => e.id === id2);
        let type = 'cable_audio';

        // Reglas de conexión automática
        const isHydra = e1.type === 'panel_hydra' || e2.type === 'panel_hydra';
        const isCam = e1.type === 'camara_tv' || e2.type === 'camara_tv' || e1.type === 'camara_eng' || e2.type === 'camara_eng';
        const isTruck = e1.type === 'camion_um' || e2.type === 'camion_um';
        const isBox = e1.type === 'caja_conexion' || e2.type === 'caja_conexion';
        const isSmall = e1.type === 'micro_mano' || e1.type === 'microcasco' || e2.type === 'micro_mano' || e2.type === 'microcasco';

        if (isHydra) type = 'cable_fibra';
        else if (isCam && isTruck) type = 'cable_triax';
        else if (isSmall) type = 'cable_audio';
        else if (isBox && isTruck) type = 'manguera_16';
        else if (isBox) type = 'manguera_8';

        pushHistory();
        state.connections.push({ id: state.nextId++, from: id1, to: id2, type, label: '' });
        render();
    }

    function render() {
        renderElements();
        renderConnections();
        document.getElementById('stats').innerText = `Elementos: ${state.elements.length} | Conexiones: ${state.connections.length}`;
        saveAuto();
    }

    function renderGrid() {
        const g = document.getElementById('grid-layer'); g.innerHTML = '';
        for(let i=0; i<1600; i+=40) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", i); l.setAttribute("y1", 0); l.setAttribute("x2", i); l.setAttribute("y2", 900);
            l.setAttribute("stroke", "rgba(255,255,255,0.03)"); g.appendChild(l);
        }
        for(let i=0; i<900; i+=40) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", 0); l.setAttribute("y1", i); l.setAttribute("x2", 1600); l.setAttribute("y2", i);
            l.setAttribute("stroke", "rgba(255,255,255,0.03)"); g.appendChild(l);
        }
    }

    function renderElements() {
        const layer = document.getElementById('elements-layer'); layer.innerHTML = '';
        state.elements.forEach(el => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            let cls = "element-node";
            if (state.selectedId === el.id) cls += " selected";
            if (state.pendingSource === el.id) cls += " pending";
            g.setAttribute("class", cls);
            
            // Mirror logic
            let transform = `translate(${el.x}, ${el.y})`;
            if (el.mirror) transform += ` translate(${el.w || meta.w}, 0) scale(-1, 1)`;
            g.setAttribute("transform", transform);

            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("class", "bbox"); rect.setAttribute("width", el.w); rect.setAttribute("height", el.h);
            g.appendChild(rect);

            const content = document.createElementNS("http://www.w3.org/2000/svg", "g");
            content.innerHTML = ELEMENTS_LIBRARY.find(m => m.tipo === el.type).svg;
            g.appendChild(content);

            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("class", "element-label");
            txt.setAttribute("x", el.w/2); txt.setAttribute("y", el.h + 20);
            txt.setAttribute("text-anchor", "middle");
            // Reverse mirror for text
            if (el.mirror) txt.setAttribute("transform", `translate(${el.w || meta.w}, 0) scale(-1, 1) translate(-${el.w}, 0)`);
            txt.textContent = el.label;
            g.appendChild(txt);

            g.onmousedown = (e) => startDrag(e, el);
            g.onclick = (e) => { e.stopPropagation(); onNodeClick(el.id); };
            layer.appendChild(g);
        });
    }

    function selectBox(id) {
  state.selectedId = id;
  state.selectedType = 'box';
  renderAll();
  showProperties();
}

function renderBoxes() {
  const bg = document.getElementById('boxes');
  if (!bg) return;
  bg.innerHTML = '';
  (state.boxes || []).forEach(box => {
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const isSelected = state.selectedId === box.id && state.selectedType === 'box';
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', box.x);
    rect.setAttribute('y', box.y);
    rect.setAttribute('width', box.w);
    rect.setAttribute('height', box.h);
    rect.setAttribute('fill', 'rgba(0,100,200,0.03)');
    rect.setAttribute('stroke', isSelected ? '#333333' : '#888888');
    rect.setAttribute('stroke-width', isSelected ? '4' : '2');
    rect.setAttribute('stroke-dasharray', '8,4');
    rect.setAttribute('rx', '10');
    group.appendChild(rect);
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', box.x); hit.setAttribute('y', box.y);
    hit.setAttribute('width', box.w); hit.setAttribute('height', box.h);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '15');
    hit.style.cursor = 'move';
    hit.addEventListener('mousedown', (e) => startBoxDrag(e, box.id));
    hit.addEventListener('click', (e) => { e.stopPropagation(); selectBox(box.id); });
    group.appendChild(hit);
    if (isSelected) {
      const resizeH = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      resizeH.setAttribute('x', box.x + box.w - 8);
      resizeH.setAttribute('y', box.y + box.h - 8);
      resizeH.setAttribute('width', 16);
      resizeH.setAttribute('height', 16);
      resizeH.setAttribute('fill', '#666666');
      resizeH.style.cursor = 'se-resize';
      resizeH.addEventListener('mousedown', (e) => startBoxResize(e, box.id));
      group.appendChild(resizeH);
    }
    bg.appendChild(group);
  });
}

let boxResizeData = null;
function startBoxResize(e, id) {
  e.stopPropagation();
  const box = state.boxes.find(b => b.id === id);
  if (!box) return;
  pushHistory();
  const rect = document.getElementById('canvas').getBoundingClientRect();
  boxResizeData = {
    id,
    startX: (e.clientX - rect.left) / state.zoom,
    startY: (e.clientY - rect.top) / state.zoom,
    startW: box.w,
    startH: box.h
  };
  document.addEventListener('mousemove', onBoxResize);
  document.addEventListener('mouseup', endBoxResize);
}
function onBoxResize(e) {
  if (!boxResizeData) return;
  const box = state.boxes.find(b => b.id === boxResizeData.id);
  if (!box) return;
  const rect = document.getElementById('canvas').getBoundingClientRect();
  const mx = (e.clientX - rect.left) / state.zoom;
  const my = (e.clientY - rect.top) / state.zoom;
  box.w = Math.max(50, boxResizeData.startW + (mx - boxResizeData.startX));
  box.h = Math.max(50, boxResizeData.startH + (my - boxResizeData.startY));
  renderAll();
}
function endBoxResize() {
  if (boxResizeData) autoSave();
  boxResizeData = null;
  document.removeEventListener('mousemove', onBoxResize);
  document.removeEventListener('mouseup', endBoxResize);
}

let boxDragData = null;
function startBoxDrag(e, id) {
  if (state.tool !== 'select') return;
  e.stopPropagation();
  const box = state.boxes.find(b => b.id === id);
  if (!box) return;
  pushHistory();
  const rect = document.getElementById('canvas').getBoundingClientRect();
  boxDragData = {
    id,
    offsetX: (e.clientX - rect.left) / state.zoom - box.x,
    offsetY: (e.clientY - rect.top) / state.zoom - box.y
  };
  document.addEventListener('mousemove', onBoxDrag);
  document.addEventListener('mouseup', endBoxDrag);
}
function onBoxDrag(e) {
  if (!boxDragData) return;
  const box = state.boxes.find(b => b.id === boxDragData.id);
  if (!box) return;
  const rect = document.getElementById('canvas').getBoundingClientRect();
  box.x = Math.round(((e.clientX - rect.left) / state.zoom - boxDragData.offsetX) / 10) * 10;
  box.y = Math.round(((e.clientY - rect.top) / state.zoom - boxDragData.offsetY) / 10) * 10;
  renderAll();
}
function endBoxDrag() {
  if (boxDragData) autoSave();
  boxDragData = null;
  document.removeEventListener('mousemove', onBoxDrag);
  document.removeEventListener('mouseup', endBoxDrag);
}

function renderConnections() {
        const layer = document.getElementById('connections-layer'); layer.innerHTML = '';
        state.connections.forEach(conn => {
            const e1 = state.elements.find(e => e.id === conn.from);
            const e2 = state.elements.find(e => e.id === conn.to);
            if (!e1 || !e2) return;

            // Truck specific anchor points
            let x1 = e1.x + e1.w/2, y1 = e1.y + e1.h/2;
            let x2 = e2.x + e2.w/2, y2 = e2.y + e2.h/2;

            if (e1.type === 'camion_um') {
                if (conn.type === 'cable_triax') { y1 = e1.y; } // Roof
                else if (conn.type === 'cable_fibra') { x1 = e1.x + 326/420*e1.w; } // Hydra zone
                else { x1 = e1.x + 163/420*e1.w; } // Analog zone
            }
            if (e2.type === 'camion_um') {
                if (conn.type === 'cable_triax') { y2 = e2.y; }
                else if (conn.type === 'cable_fibra') { x2 = e2.x + 326/420*e2.w; }
                else { x2 = e2.x + 163/420*e2.w; }
            }

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midY = (y1 + y2) / 2;
            path.setAttribute("d", `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`);
            path.setAttribute("class", "connection");
            path.setAttribute("stroke", CABLE_TYPES[conn.type].color);
            path.setAttribute("stroke-width", CABLE_TYPES[conn.type].width);
            path.onclick = (e) => { e.stopPropagation(); selectConnection(conn.id); };
            layer.appendChild(path);
        });
    }

    // Drag, Undo, Save etc.
    let dragTarget = null, offset = { x: 0, y: 0 };
    function startDrag(e, el) { if (state.tool !== 'select') return; dragTarget = el; const rect = canvas.getBoundingClientRect(); offset.x = (e.clientX - rect.left)*(1600/rect.width) - el.x; offset.y = (e.clientY - rect.top)*(900/rect.height) - el.y; pushHistory(); }
    function handleCanvasMouseMove(e) { if (dragTarget) { const rect = canvas.getBoundingClientRect(); dragTarget.x = Math.round((e.clientX - rect.left)*(1600/rect.width) - offset.x); dragTarget.y = Math.round((e.clientY - rect.top)*(900/rect.height) - offset.y); render(); } }
    window.onmouseup = () => { dragTarget = null; };
    function deleteSelected() { if (!state.selectedId) return; pushHistory(); if (state.selectedType === 'element') { state.elements = state.elements.filter(e => e.id !== state.selectedId); state.connections = state.connections.filter(c => c.from !== state.selectedId && c.to !== state.selectedId); } else { state.connections = state.connections.filter(c => c.id !== state.selectedId); } state.selectedId = null; render(); }
    function pushHistory() { state.history = state.history.slice(0, state.historyIndex + 1); state.history.push(JSON.stringify({ elements: state.elements, connections: state.connections })); state.historyIndex++; document.getElementById('btn-undo').disabled = false; }
    function undo() { if (state.historyIndex <= 0) return; state.historyIndex--; const data = JSON.parse(state.history[state.historyIndex]); state.elements = data.elements; state.connections = data.connections; render(); }
    function saveAuto() { localStorage.setItem('um_lite_save', JSON.stringify({ elements: state.elements, connections: state.connections, title: document.getElementById('diagram-title').value })); }
    function loadAuto() { const saved = localStorage.getItem('um_lite_save'); if (saved) { const data = JSON.parse(saved); state.elements = data.elements; state.connections = data.connections; document.getElementById('diagram-title').value = data.title; state.nextId = Math.max(0, ...state.elements.map(e=>e.id), ...state.connections.map(c=>c.id)) + 1; render(); } }
    function exportSVG() { const svgData = document.getElementById('canvas').outerHTML; const blob = new Blob([svgData], {type: "image/svg+xml"}); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = "esquema.svg"; link.click(); }

function handleSvgUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    document.getElementById('import-svg').value = evt.target.result;
    if (!document.getElementById('import-name').value) {
      let name = file.name.replace(/\.svg$/i, '').replace(/[_-]/g, ' ');
      name = name.charAt(0).toUpperCase() + name.slice(1);
      document.getElementById('import-name').value = name;
    }
  };
  reader.readAsText(file);
}

function openImportModal() {
  document.getElementById('import-name').value = '';
  document.getElementById('import-svg').value = '';
  const fileInput = document.getElementById('import-file');
  if(fileInput) fileInput.value = '';
  document.getElementById('modal-import').style.display = 'block';
}

function saveImportedElement() {
  const name = document.getElementById('import-name').value.trim();
  const conn = document.getElementById('import-conn').value;
  let svgCode = document.getElementById('import-svg').value.trim();
  
  if (!name || !svgCode) {
    alert('Por favor, indica un nombre y pega el código SVG.');
    return;
  }
  
  let w = 100, h = 100;
  const vbMatch = svgCode.match(/viewBox=["'][\d\s\.]+ (\d+(?:\.\d+)?) (\d+(?:\.\d+)?)["']/);
  if (vbMatch) {
    w = parseFloat(vbMatch[1]);
    h = parseFloat(vbMatch[2]);
  } else {
    const wMatch = svgCode.match(/width=["'](\d+(?:\.\d+)?)["']/);
    const hMatch = svgCode.match(/height=["'](\d+(?:\.\d+)?)["']/);
    if (wMatch) w = parseFloat(wMatch[1]);
    if (hMatch) h = parseFloat(hMatch[1]);
  }
  
  // Clean text tags to avoid duplication
  svgCode = svgCode.replace(/<text[\s\S]*?<\/text>/gi, '');
  
  const id = 'custom_' + Date.now();
  state.customLibrary = state.customLibrary || [];
  state.customLibrary.push({
    tipo: id,
    nombre: name,
    w: w,
    h: h,
    svg: svgCode,
    customConnType: conn
  });
  
  autoSave();
  buildElementList(); // Refresh sidebar
  document.getElementById('modal-import').style.display = 'none';
}

function deleteBox(id) { pushHistory(); state.boxes = state.boxes.filter(b => b.id !== id); state.selectedId = null; state.selectedType = null; renderAll(); autoSave(); }

</script>
  <div id="modal-import" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:8px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1000; width:450px;">
    <h3>Importar Nuevo Equipo</h3>
    <div class="field" style="margin-bottom:10px;">
      <label>Nombre del Equipo</label>
      <input type="text" id="import-name" style="width:100%; padding:5px;">
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>Comportamiento de Conexión</label>
      <select id="import-conn" style="width:100%; padding:5px;">
        <option value="analog_box">Caja Analógica (Panel a Manguera)</option>
        <option value="analog_mic">Elemento Analógico (Micro a XLR)</option>
        <option value="digital">Equipo Digital (Red / Fibra)</option>
        <option value="both">Híbrido (Ambos tipos permitidos)</option>
        <option value="camera">Cámara (Triax)</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <label>Código SVG (Pégalo o carga un archivo)</label>
      <input type="file" id="import-file" accept=".svg" onchange="handleSvgUpload(event)" style="margin-bottom:5px; width:100%;">
      <textarea id="import-svg" rows="6" style="width:100%; font-family:monospace; font-size:10px;" placeholder="Pega aquí todo el código <svg>..."></textarea>
    </div>
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="saveImportedElement()" style="flex:1; background:#0066cc; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">Añadir a Librería</button>
      <button onclick="document.getElementById('modal-import').style.display='none'" style="flex:1; background:#ccc; border:none; padding:8px; border-radius:4px; cursor:pointer;">Cancelar</button>
    </div>
  </div>
</body>
</html>
